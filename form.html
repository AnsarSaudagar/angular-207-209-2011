<form #myForm="ngForm" (ngSubmit)="onSubmit(myForm)" class="bg-white p-6 rounded-lg shadow-md w-full  space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">
          Name*
        </label>
        <input
          #name="ngModel"
          type="text"
          id="name"
          name="name"
          [(ngModel)]="product.name"
          class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter product name"
          required
          minlength="5"
          maxlength="=10"
        />
        
        <!-- @if(!name.valid && name.touched || !name.valid && myForm.submitted){
          <span class="text-red-400 text-sm font-medium">Name is Required</span>
        } -->
        @if(name?.errors?.['required'] && name.touched){
          <span class="text-red-400 text-sm font-medium">Name is Required</span>
        }
        @if(name?.errors?.['minlength'] && name.touched){
          <span class="text-red-400 text-sm font-medium">Minimum lenght = 5</span>
        }
      </div>

      <div>
        <label for="price" class="block text-sm font-medium text-gray-700">
          Price*
        </label>
        <input
        #price="ngModel"
          type="number"
          id="price"
          name="price"
          [(ngModel)]="product.price"
          class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter price"
          required
        />
        @if(!price.valid && price.touched || !price.valid && myForm.submitted){
          <span class="text-red-400 text-sm font-medium">Price is Required</span>
        }
      </div>

      <div>
        <label for="description" class="block text-sm font-medium text-gray-700">
          Description
        </label>
        <textarea
          id="description"
          name="description"
          rows="3"
          [(ngModel)]="product.description"
          class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter description"
        ></textarea>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
      >
        Submit
      </button>

    </form>
