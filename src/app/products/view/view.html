<div class="max-w-6xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-md overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <!-- Product Image -->
      <div class="p-4 flex items-center justify-center">
        <img [src]="productData.img" alt="Product Image" class="rounded-xl w-full object-cover">
      </div>

      <!-- Product Details -->
      <div class="p-6 flex flex-col justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-800 mb-2">{{productData.name}}</h1>
          <p class="text-gray-600 mb-4">
            {{productData.description}}
          </p>
          <p class="text-3xl font-semibold text-green-600 mb-6">${{productData.price}}</p>
        </div>

        <div class="flex gap-4">
          <button class="bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 transition">
            Add to Cart
          </button>
          <button class="bg-gray-200 text-gray-800 px-6 py-2 rounded-xl hover:bg-gray-300 transition">
            Buy Now
          </button>
        </div>
      </div>

    </div>
  </div>
