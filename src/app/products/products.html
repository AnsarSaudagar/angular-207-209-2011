

<!-- ================= PRODUCTS ================= -->
<section class="max-w-7xl mx-auto px-6 mt-14 pb-16">
  

    <h2 class="text-3xl font-semibold text-gray-800 mb-10 text-center">
        Trending Products
    </h2>

    <div  class="grid gap-10 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

      @if(products.length > 0) {
        @for(product of products; track product.name){ 
         <div  
         
          class="bg-white rounded-3xl shadow-lg overflow-hidden group hover:shadow-2xl transition duration-300">
        <div class="overflow-hidden">
          <img [src]="product.img"
               class="w-full h-60 object-cover group-hover:scale-110 transition duration-500">
        </div>

        <div class="p-5">
          <h3 class="font-semibold text-lg">{{product.name}}</h3>
          <p class="text-gray-500 text-sm mt-1">{{product.description}}</p>

          <div class="flex justify-between items-center mt-4">
            <span
             class="text-xl font-bold text-indigo-600"
            >{{product.price}}</span>
            <button class="  bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
              Buy
            </button>
          </div>
        </div>
      </div>
        }
      } @else {
    <div>
      <h1 class="text-6xl font-bold text-center">No products available</h1>
    </div>
      }
        

    </div>

    
</section>
